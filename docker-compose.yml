services:
  football-blog:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: football-blog
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # 持久化文章数据
      - ./posts:/app/posts
      - ./data:/app/data
      # 持久化音乐文件
      - ./public/music:/app/public/music
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    networks:
      - blog-network

  # Nginx 反向代理（可选，如需在同一服务器运行）
  nginx:
    image: nginx:alpine
    container_name: blog-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - football-blog
    networks:
      - blog-network

networks:
  blog-network:
    driver: bridge

volumes:
  blog-data:
